version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
    groups:
      gradle-dependencies:
        patterns:
          - "*"
    ignore:
      # These are part of the repo-specific compatibility/update policy and
      # should be updated together by custom automation instead of ad hoc PRs.
      - dependency-name: "io.opentelemetry:*"
      - dependency-name: "io.opentelemetry.instrumentation:*"
      - dependency-name: "io.opentelemetry.javaagent:*"
      - dependency-name: "io.opentelemetry.javaagent.instrumentation:*"
      - dependency-name: "org.typelevel:cats-effect_*"
      - dependency-name: "org.typelevel:otel4s-*"
